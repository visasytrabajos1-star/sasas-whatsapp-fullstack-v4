services:
  - type: web
    name: whatsapp-fullstack
    version: 2.0.4
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WHATSAPP_MAX_RECONNECT_ATTEMPTS
        value: "8"
      - key: WHATSAPP_SESSIONS_TABLE
        value: "whatsapp_sessions"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        value: alex_prod_safe_token_2026

  - type: static
    name: whatsapp-fullstack-1
    env: static
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://whatsapp-fullstack-gkm6.onrender.com
      - key: REACT_APP_API_TIMEOUT_MS
        value: "20000"
      - key: REACT_APP_RENDER_BACKEND_URL
        value: https://whatsapp-fullstack-gkm6.onrender.com
