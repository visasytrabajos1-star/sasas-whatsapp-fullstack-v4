services:
  - type: web
    name: alex-io-v4-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WHATSAPP_SESSIONS_TABLE
        value: "whatsapp_sessions"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: static
    name: alex-io-v4-frontend
    env: static
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: VITE_API_URL
        value: https://alex-io-v4-backend.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://ygsmooajrqldzdtcukfd.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: sb_publishable_X3xx0LH-LOLJf7q5M52yVQ_JUq3AzT8
