services:
  - type: web
    name: alex-io-v4-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WHATSAPP_SESSIONS_TABLE
        value: "whatsapp_sessions"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        value: "admin@alex.io" # Add comma-separated emails in Render dashboard
      # Frontend Variables (Must be available during build time)
      - key: VITE_API_URL
        value: https://alex-io-v4-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
